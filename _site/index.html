<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Art Editor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .cell {
      all: unset;
      box-sizing: border-box;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      background-color: transparent;
      /* checkerboard for transparency */
      background-image:
        linear-gradient(45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(255,255,255,0.05) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(255,255,255,0.05) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(255,255,255,0.05) 75%);
      background-size: 8px 8px;
      background-position: 0 0, 0 4px, 4px -4px, -4px 0;
    }
    .cell.painted {
      background-image: none;
    }
    .cell:hover {
      outline: 2px solid rgba(59,130,246,0.7);
      outline-offset: -2px;
      z-index: 1;
    }
    #grid {
      display: grid;
      user-select: none;
      touch-action: none;
    }
    #gridWrapper {
      display: inline-grid;
      grid-template-columns: auto auto auto;
      grid-template-rows: auto auto auto;
    }
    .ruler-label {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: rgba(255,255,255,0.45);
      font-family: monospace;
      user-select: none;
    }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 h-screen flex flex-col items-center p-1 gap-1 overflow-hidden">

  <!-- Toolbar -->
  <div class="bg-gray-800 rounded px-2 py-0.5 flex items-center justify-center gap-1.5 w-full max-w-full shadow-lg shrink-0 text-[11px] leading-tight">
    <span class="font-bold">Pixel Art</span>
    <span class="text-gray-600">|</span>

    <label class="flex items-center gap-0.5">C<input id="cols" type="number" min="1" max="128" value="32"
      class="w-10 bg-gray-700 rounded px-0.5 text-center text-[11px]" /></label>
    <label class="flex items-center gap-0.5">R<input id="rows" type="number" min="1" max="128" value="32"
      class="w-10 bg-gray-700 rounded px-0.5 text-center text-[11px]" /></label>
    <button id="applyGrid" class="px-1.5 bg-blue-600 hover:bg-blue-500 rounded font-semibold">Go</button>

    <span class="text-gray-600">|</span>

    <select id="colorMode" class="bg-gray-700 rounded px-0.5 text-[11px]">
      <option value="rgb">RGB</option>
      <option value="hsl">HSL</option>
    </select>
    <div id="rgbInputs" class="flex items-center gap-0.5">
      <input id="r" type="number" min="0" max="255" value="135" class="w-9 bg-gray-700 rounded px-0.5 text-center text-[11px]" title="R" />
      <input id="g" type="number" min="0" max="255" value="206" class="w-9 bg-gray-700 rounded px-0.5 text-center text-[11px]" title="G" />
      <input id="b" type="number" min="0" max="255" value="250" class="w-9 bg-gray-700 rounded px-0.5 text-center text-[11px]" title="B" />
    </div>
    <div id="hslInputs" class="hidden flex items-center gap-0.5">
      <input id="h" type="number" min="0" max="360" value="0" class="w-9 bg-gray-700 rounded px-0.5 text-center text-[11px]" title="H" />
      <input id="s" type="number" min="0" max="100" value="100" class="w-9 bg-gray-700 rounded px-0.5 text-center text-[11px]" title="S%" />
      <input id="l" type="number" min="0" max="100" value="50" class="w-9 bg-gray-700 rounded px-0.5 text-center text-[11px]" title="L%" />
    </div>
    <input id="a" type="number" min="0" max="1" step="0.1" value="1" class="w-8 bg-gray-700 rounded px-0.5 text-center text-[11px]" title="Alpha" />
    <div class="relative w-5 h-5 shrink-0">
      <div id="colorPreview" class="w-5 h-5 rounded border border-gray-600 cursor-pointer" style="background-color:rgb(135,206,250)" title="Click to pick color"></div>
      <input id="nativePicker" type="color" value="#87cefa" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
    </div>
    <span class="text-gray-600">|</span>
    <select id="scale" class="bg-gray-700 rounded px-0.5 text-[11px]" title="Export Scale">
      <option value="1">1x</option><option value="2">2x</option><option value="3">3x</option>
      <option value="5" selected>5x</option><option value="8">8x</option><option value="10">10x</option>
      <option value="16">16x</option><option value="32">32x</option>
    </select>
    <button id="exportSvg" class="px-1.5 bg-emerald-600 hover:bg-emerald-500 rounded font-semibold">SVG</button>
    <button id="exportPng" class="px-1.5 bg-purple-600 hover:bg-purple-500 rounded font-semibold">PNG</button>
    <button id="clearGrid" class="px-1.5 bg-red-600 hover:bg-red-500 rounded font-semibold">Clear</button>
  </div>

  <!-- Canvas Grid with rulers (centered) -->
  <div id="gridContainer" class="bg-gray-800 rounded-lg shadow-lg overflow-auto w-full flex-1 min-h-0 flex items-center justify-center p-1 relative">
    <!-- Zoom overlay -->
    <div class="absolute top-1 left-1 z-10 flex items-center gap-1 bg-gray-900/80 rounded px-1.5 py-0.5 text-[10px] backdrop-blur-sm">
      <button id="zoomOut" class="px-1 bg-gray-700 hover:bg-gray-600 rounded font-bold">−</button>
      <span id="zoomLevel" class="tabular-nums w-8 text-center">100%</span>
      <button id="zoomIn" class="px-1 bg-gray-700 hover:bg-gray-600 rounded font-bold">+</button>
      <button id="zoomFit" class="px-1 bg-gray-700 hover:bg-gray-600 rounded">Fit</button>
    </div>
    <div id="gridWrapper" class="inline-grid" style="gap:0;">
      <div id="cornerTL"></div>
      <div id="rulerTop" class="grid" style="gap:0;"></div>
      <div id="cornerTR"></div>
      <div id="rulerLeft" class="grid" style="gap:0;"></div>
      <div id="grid"></div>
      <div id="rulerRight" class="grid" style="gap:0;"></div>
      <div id="cornerBL"></div>
      <div id="rulerBottom" class="grid" style="gap:0;"></div>
      <div id="cornerBR"></div>
    </div>
  </div>


<script>
const BLANK = "rgba(0,0,0,0)";

/* ---- state ---- */
let cols = 16, rows = 16;
let grid = [];          // flat array of color strings
let painting = false;   // is mouse held down

/* ---- DOM refs ---- */
const $grid      = document.getElementById("grid");
const $cols      = document.getElementById("cols");
const $rows      = document.getElementById("rows");
const $mode      = document.getElementById("colorMode");
const $rgbInputs = document.getElementById("rgbInputs");
const $hslInputs = document.getElementById("hslInputs");
const $r = document.getElementById("r");
const $g = document.getElementById("g");
const $b = document.getElementById("b");
const $h = document.getElementById("h");
const $s = document.getElementById("s");
const $l = document.getElementById("l");
const $a = document.getElementById("a");
const $preview   = document.getElementById("colorPreview");
const $picker    = document.getElementById("nativePicker");
const $scale     = document.getElementById("scale");

/* ---- color helpers ---- */
function currentColor() {
  const alpha = Math.max(0, Math.min(1, parseFloat($a.value) || 0));
  if ($mode.value === "hsl") {
    return `hsla(${$h.value}, ${$s.value}%, ${$l.value}%, ${alpha})`;
  }
  return `rgba(${$r.value}, ${$g.value}, ${$b.value}, ${alpha})`;
}

function updatePreview() {
  $preview.style.backgroundColor = currentColor();
}

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function rgbToHex(r, g, b) {
  return "#" + [r, g, b].map(v => v.toString(16).padStart(2, "0")).join("");
}

/* Sync native picker → inputs */
$picker.addEventListener("input", () => {
  const [rv, gv, bv] = hexToRgb($picker.value);
  $r.value = rv; $g.value = gv; $b.value = bv;
  if ($mode.value === "hsl") {
    const [hv, sv, lv] = rgbToHsl(rv, gv, bv);
    $h.value = hv; $s.value = sv; $l.value = lv;
  }
  updatePreview();
});

function rgbToHsl(r, g, b) {
  r /= 255; g /= 255; b /= 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h = 0, s = 0, l = (max + min) / 2;
  if (max !== min) {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
}

/* ---- color mode toggle ---- */
$mode.addEventListener("change", () => {
  const isHsl = $mode.value === "hsl";
  $rgbInputs.classList.toggle("hidden", isHsl);
  $hslInputs.classList.toggle("hidden", !isHsl);
  if (isHsl) {
    const [hv, sv, lv] = rgbToHsl(+$r.value, +$g.value, +$b.value);
    $h.value = hv; $s.value = sv; $l.value = lv;
  } else {
    // convert HSL back to RGB for the inputs
    const tmp = document.createElement("div");
    tmp.style.color = `hsl(${$h.value}, ${$s.value}%, ${$l.value}%)`;
    document.body.appendChild(tmp);
    const computed = getComputedStyle(tmp).color;
    document.body.removeChild(tmp);
    const m = computed.match(/\d+/g);
    if (m) { $r.value = m[0]; $g.value = m[1]; $b.value = m[2]; }
  }
  updatePreview();
});

[$r, $g, $b, $h, $s, $l, $a].forEach(el => el.addEventListener("input", () => {
  updatePreview();
  // sync native picker
  if ($mode.value === "rgb") {
    $picker.value = rgbToHex(+$r.value, +$g.value, +$b.value);
  }
}));

/* ---- disable context menu ---- */
document.addEventListener("contextmenu", (e) => e.preventDefault());

/* ---- zoom state ---- */
const BASE_CELL = 24;       // cell size at 100%
const MIN_CELL = 4;
const MAX_CELL = 80;
let cellSize = BASE_CELL;
const $zoomLevel = document.getElementById("zoomLevel");

function zoomPercent() { return Math.round(cellSize / BASE_CELL * 100); }
function updateZoomLabel() { $zoomLevel.textContent = zoomPercent() + "%"; }

/* ---- grid ---- */
const $rulerTop    = document.getElementById("rulerTop");
const $rulerBottom = document.getElementById("rulerBottom");
const $rulerLeft   = document.getElementById("rulerLeft");
const $rulerRight  = document.getElementById("rulerRight");
const $gridContainer = document.getElementById("gridContainer");

function makeLabel(text, w, h) {
  const d = document.createElement("div");
  d.className = "ruler-label";
  d.style.width = w + "px";
  d.style.height = h + "px";
  d.textContent = text;
  return d;
}

/* Rebuild DOM cells + rulers (called on col/row change) */
function buildGrid() {
  cols = Math.max(1, Math.min(128, +$cols.value || 16));
  rows = Math.max(1, Math.min(128, +$rows.value || 16));
  $cols.value = cols;
  $rows.value = rows;

  grid = new Array(cols * rows).fill(BLANK);
  $grid.innerHTML = "";

  for (let i = 0; i < cols * rows; i++) {
    const btn = document.createElement("button");
    btn.className = "cell";
    btn.style.backgroundColor = BLANK;
    btn.dataset.i = i;
    $grid.appendChild(btn);
  }

  applyCellSize();
}

/* Resize cells + rulers without rebuilding DOM (called on zoom) */
function applyCellSize() {
  const rulerW = Math.max(16, cellSize * 0.8);
  const rulerH = Math.max(12, cellSize * 0.55);
  const fontSize = Math.max(6, Math.min(11, cellSize * 0.4));

  $grid.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  $grid.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;

  // resize all cells
  const cells = $grid.querySelectorAll(".cell");
  cells.forEach(c => { c.style.width = cellSize + "px"; c.style.height = cellSize + "px"; });

  // rebuild rulers (lightweight, just labels)
  $rulerTop.innerHTML = "";
  $rulerBottom.innerHTML = "";
  $rulerTop.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  $rulerBottom.style.gridTemplateColumns = `repeat(${cols}, ${cellSize}px)`;
  for (let c = 0; c < cols; c++) {
    const tl = makeLabel(c + 1, cellSize, rulerH);
    const bl = makeLabel(c + 1, cellSize, rulerH);
    tl.style.fontSize = fontSize + "px";
    bl.style.fontSize = fontSize + "px";
    $rulerTop.appendChild(tl);
    $rulerBottom.appendChild(bl);
  }

  $rulerLeft.innerHTML = "";
  $rulerRight.innerHTML = "";
  $rulerLeft.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
  $rulerRight.style.gridTemplateRows = `repeat(${rows}, ${cellSize}px)`;
  for (let r = 0; r < rows; r++) {
    const ll = makeLabel(r + 1, rulerW, cellSize);
    const rl = makeLabel(r + 1, rulerW, cellSize);
    ll.style.fontSize = fontSize + "px";
    rl.style.fontSize = fontSize + "px";
    $rulerLeft.appendChild(ll);
    $rulerRight.appendChild(rl);
  }

  updateZoomLabel();
}

/* ---- zoom controls ---- */
function zoomTo(newSize) {
  cellSize = Math.max(MIN_CELL, Math.min(MAX_CELL, Math.round(newSize)));
  applyCellSize();
}

document.getElementById("zoomIn").addEventListener("click", () => zoomTo(cellSize + 4));
document.getElementById("zoomOut").addEventListener("click", () => zoomTo(cellSize - 4));
document.getElementById("zoomFit").addEventListener("click", () => {
  const container = $gridContainer;
  const maxW = (container.clientWidth - 80) / cols;   // 80 = ruler margins + padding
  const maxH = (container.clientHeight - 60) / rows;
  zoomTo(Math.min(maxW, maxH));
});

/* Scroll to zoom */
$gridContainer.addEventListener("wheel", (e) => {
  e.preventDefault();
  const step = e.deltaY < 0 ? 2 : -2;
  zoomTo(cellSize + step);
}, { passive: false });

function paintCell(el, erase) {
  const i = +el.dataset.i;
  if (i == null || isNaN(i)) return;
  const color = erase ? BLANK : currentColor();
  grid[i] = color;
  el.style.backgroundColor = color;
  if (color === BLANK) {
    el.classList.remove("painted");
  } else {
    el.classList.add("painted");
  }
}

/* pointer events for click + drag painting (right-click = erase) */
let erasing = false;

$grid.addEventListener("pointerdown", (e) => {
  if (!e.target.classList.contains("cell")) return;
  painting = true;
  erasing = e.button === 2;
  e.target.setPointerCapture?.(e.pointerId);
  paintCell(e.target, erasing);
});

$grid.addEventListener("pointermove", (e) => {
  if (!painting) return;
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (el && el.classList.contains("cell")) paintCell(el, erasing);
});

document.addEventListener("pointerup", () => { painting = false; });

document.getElementById("applyGrid").addEventListener("click", buildGrid);

/* ---- clear ---- */
document.getElementById("clearGrid").addEventListener("click", () => {
  grid.fill(BLANK);
  $grid.querySelectorAll(".cell").forEach(c => { c.style.backgroundColor = BLANK; c.classList.remove("painted"); });
});

/* ---- SVG generation ---- */
function colorToRgba(color) {
  const tmp = document.createElement("div");
  tmp.style.color = color;
  document.body.appendChild(tmp);
  const computed = getComputedStyle(tmp).color;
  document.body.removeChild(tmp);
  // computed is "rgb(r, g, b)" or "rgba(r, g, b, a)"
  const m = computed.match(/[\d.]+/g);
  if (m) {
    const a = m[3] !== undefined ? parseFloat(m[3]) : 1;
    if (a < 1) return `rgba(${m[0]}, ${m[1]}, ${m[2]}, ${a})`;
    return `rgb(${m[0]}, ${m[1]}, ${m[2]})`;
  }
  return color;
}

function buildSvgString() {
  const scale = +$scale.value || 5;
  const w = cols * scale;
  const h = rows * scale;

  let rects = "";
  for (let i = 0; i < grid.length; i++) {
    if (grid[i] === BLANK) continue;
    const x = (i % cols) * scale;
    const y = Math.floor(i / cols) * scale;
    const fill = colorToRgba(grid[i]);
    rects += `  <rect x="${x}" y="${y}" width="${scale}" height="${scale}" fill="${fill}"/>\n`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" shape-rendering="crispEdges">\n${rects}</svg>`;
}

/* ---- export SVG ---- */
document.getElementById("exportSvg").addEventListener("click", () => {
  const svg = buildSvgString();
  const blob = new Blob([svg], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `pixel-art-${cols}x${rows}.svg`;
  a.click();
  URL.revokeObjectURL(url);
});

/* ---- export PNG ---- */
document.getElementById("exportPng").addEventListener("click", () => {
  const scale = +$scale.value || 5;
  const w = cols * scale;
  const h = rows * scale;
  const svg = buildSvgString();
  const blob = new Blob([svg], { type: "image/svg+xml" });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement("canvas");
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    canvas.toBlob((pngBlob) => {
      const purl = URL.createObjectURL(pngBlob);
      const a = document.createElement("a");
      a.href = purl;
      a.download = `pixel-art-${cols}x${rows}.png`;
      a.click();
      URL.revokeObjectURL(purl);
    });
  };
  img.src = url;
});

/* ---- init ---- */
buildGrid();
updatePreview();
</script>

  <!-- Footer -->
  <footer class="shrink-0 flex items-center justify-center gap-1 text-[10px] text-gray-500 leading-none" style="height:1em;">
    <img src="https://posetmage.com/Images/Icon/ShinraMage.svg" alt="" class="w-2.5 h-2.5" />
    <span>Shinra Mage</span>
    <span class="text-gray-700">|</span>
    <a href="https://github.com/ShinraMage/pixel-art-svg" target="_blank" rel="noopener"
      class="hover:text-gray-300 flex items-center gap-0.5">
      <svg class="w-2.5 h-2.5" fill="currentColor" viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      pixel-art-svg
    </a>
  </footer>
</body>
</html>
